name: Build release packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write  # upload release assets + push bucket manifest updates

jobs:
  # --------------------------------------------------------------------------
  #  Debian / Ubuntu  →  .deb
  # --------------------------------------------------------------------------
  deb:
    name: Build .deb (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:bookworm
            slug: debian12
          - image: ubuntu:24.04
            slug: ubuntu24.04
          - image: ubuntu:22.04
            slug: ubuntu22.04
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential devscripts dpkg-dev debhelper dh-python \
            python3-all python3-build python3-setuptools python3-wheel \
            pybuild-plugin-pyproject lintian git ca-certificates

      - uses: actions/checkout@v4

      - name: Build .deb
        run: |
          packaging/debian/build-deb.sh

      - name: Rename artifacts for the release
        run: |
          cd packaging/debian/dist
          VERSION=$(ls whydpi_*.deb | sed -E 's/whydpi_([^_]+)_.*/\1/')
          for f in whydpi_${VERSION}_all.deb; do
            mv "$f" "whydpi_${VERSION}_${{ matrix.slug }}_all.deb"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.slug }}
          path: packaging/debian/dist/*.deb
          retention-days: 7

  # --------------------------------------------------------------------------
  #  Fedora  →  .rpm
  # --------------------------------------------------------------------------
  rpm:
    name: Build .rpm (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ['fedora:41', 'fedora:40']
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --quiet \
            rpm-build rpmlint git tar \
            python3-devel python3-setuptools python3-build \
            python3-installer python3-wheel systemd-rpm-macros

      - uses: actions/checkout@v4

      - name: Build .rpm
        run: |
          packaging/fedora/build-rpm.sh

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.image }}
          path: packaging/fedora/dist/*.rpm
          retention-days: 7

  # --------------------------------------------------------------------------
  #  Windows  →  whydpi-tray.exe + whydpi.exe + whydpi-<ver>-setup.exe
  # --------------------------------------------------------------------------
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[windows]"
          pip install pyinstaller

      - name: Derive version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($ver)) { $ver = '0.0.0' }
          "WHYDPI_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append
          "version=$ver"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "resolved version: $ver"

      - name: Diagnostics (Python + deps)
        shell: pwsh
        run: |
          python --version
          python -c "import sys; print('sys.platform =', sys.platform)"
          pip --version
          pyinstaller --version
          pip list
          Write-Host "---- import-time probe ----"
          python -c "from whydpi.ui.tray import run; print('tray import ok')"
          python -c "from whydpi.platforms import windows; print('platforms.windows import ok')"
          python -c "from whydpi.system import windivert, dns_windows; print('system modules import ok')"

      - name: Build whydpi-tray.exe
        shell: pwsh
        working-directory: packaging\windows
        run: |
          pyinstaller --onefile --windowed --uac-admin `
            --icon="..\..\assets\favicon.ico" `
            --add-data "..\..\whydpi\ui\_assets;whydpi\ui\_assets" `
            --collect-all pydivert `
            --collect-all pystray `
            --collect-all PIL `
            --hidden-import whydpi.platforms.windows `
            --hidden-import whydpi.system.windivert `
            --hidden-import whydpi.system.dns_windows `
            --name whydpi-tray `
            --distpath build\dist `
            --workpath build\work `
            --specpath build `
            tray_entry.py

      - name: Build whydpi.exe
        shell: pwsh
        working-directory: packaging\windows
        run: |
          pyinstaller --onefile --console --uac-admin `
            --icon="..\..\assets\favicon.ico" `
            --collect-all pydivert `
            --hidden-import whydpi.platforms.windows `
            --hidden-import whydpi.system.windivert `
            --hidden-import whydpi.system.dns_windows `
            --name whydpi `
            --distpath build\dist `
            --workpath build\work `
            --specpath build `
            cli_entry.py

      - name: Smoke-test the built executables
        shell: pwsh
        working-directory: packaging\windows\build\dist
        run: |
          # `whydpi.exe --help` is non-blocking (CLI parser + exit) so it
          # gives us a real end-to-end PyInstaller bundle check: every
          # hidden import we pinned (whydpi.platforms.windows, windivert,
          # dns_windows) must import successfully or --help crashes.
          $out = & ".\whydpi.exe" --help 2>&1
          Write-Host "cli exit: $LASTEXITCODE"
          Write-Host "cli output:`n$out"
          if ($LASTEXITCODE -ne 0) { throw "whydpi.exe --help failed" }

          # The tray's main loop is blocking by design (pystray.Icon.run),
          # so we can't invoke it in CI.  Settle for proving the bundle is
          # loadable by launching with a 5-second watchdog and killing it.
          $p = Start-Process ".\whydpi-tray.exe" -PassThru
          Start-Sleep -Seconds 5
          if ($p.HasExited) {
            # Exited early: acceptable only if it was the non-admin refusal.
            Write-Host "tray exited with code $($p.ExitCode) within 5s"
            if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3) {
              throw "tray exe crashed unexpectedly (exit $($p.ExitCode))"
            }
          } else {
            Write-Host "tray still running after 5s — bundle loads OK"
            Stop-Process -Id $p.Id -Force
          }

      - name: Compile Inno Setup installer
        shell: pwsh
        working-directory: packaging\windows
        env:
          WHYDPI_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # ISCC ships with Inno Setup 6 preinstalled on windows-latest images.
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" whydpi.iss

      - name: Collect artefacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item packaging\windows\build\dist\whydpi-tray.exe out\
          Copy-Item packaging\windows\build\dist\whydpi.exe      out\
          Copy-Item packaging\windows\dist\*.exe                 out\

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out\*.exe
          retention-days: 7

  # --------------------------------------------------------------------------
  #  Attach everything to the release (tag pushes only)
  # --------------------------------------------------------------------------
  release:
    name: Attach to GitHub Release
    needs: [deb, rpm, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: |
          ls -la dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mapfile -t FILES < <(ls dist/*.deb dist/*.rpm dist/*.exe 2>/dev/null)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "no artefacts to upload" >&2
            exit 1
          fi
          echo "uploading ${#FILES[@]} file(s):"
          printf '  %s\n' "${FILES[@]}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — uploading assets (overwrite)"
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            echo "creating release $TAG"
            gh release create "$TAG" "${FILES[@]}" \
              --title "$TAG" \
              --generate-notes
          fi

  # --------------------------------------------------------------------------
  #  Scoop bucket manifest — update hash + version in bucket/whydpi.json
  #  so `scoop install whydpi` works immediately after the release lands.
  # --------------------------------------------------------------------------
  scoop-bucket:
    name: Refresh Scoop manifest
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-assets

      - name: Update bucket/whydpi.json
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          EXE="windows-assets/whydpi-tray.exe"
          [ -f "$EXE" ] || { echo "missing $EXE"; exit 1; }
          HASH=$(sha256sum "$EXE" | awk '{print $1}')
          python3 - "$VER" "$HASH" <<'PY'
          import json, pathlib, sys
          ver, hsh = sys.argv[1], sys.argv[2]
          p = pathlib.Path("bucket/whydpi.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          data["version"] = ver
          data["architecture"]["64bit"]["url"] = (
              f"https://github.com/byrdltd/whyDPI/releases/download/v{ver}/whydpi-tray.exe"
          )
          data["architecture"]["64bit"]["hash"] = hsh
          p.write_text(json.dumps(data, indent=4) + "\n", encoding="utf-8")
          print(f"bucket/whydpi.json -> {ver} / {hsh[:12]}...")
          PY

      - name: Commit and push
        run: |
          set -e
          git config user.name  "whydpi-release-bot"
          git config user.email "whydpi-release-bot@users.noreply.github.com"
          if git diff --quiet bucket/whydpi.json; then
            echo "no manifest change; skipping commit"
            exit 0
          fi
          git add bucket/whydpi.json
          git commit -m "Refresh Scoop manifest for ${{ github.event.inputs.tag || github.ref_name }}"
          git push origin HEAD:main
