name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 whydpi/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings, max line length 100
        flake8 whydpi/ --count --exit-zero --max-line-length=100 --statistics

    - name: Analyze with pylint
      run: |
        pylint whydpi/ --exit-zero --max-line-length=100
      continue-on-error: true

  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Check Python syntax
      run: |
        python -m py_compile whydpi/*.py
        python -m py_compile setup.py

    - name: Install package (dry run)
      run: |
        python -m pip install --upgrade pip
        pip install --dry-run -e .

  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install and run pytest
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pytest

  windows-smoke:
    name: Windows Import Smoke Test
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    # Import the full Windows stack (TLS shaper, DNS hijacker, DNS cache,
    # tray, autostart) and exercise the logic that does not require the
    # WinDivert driver or administrative privileges — strategy remapping,
    # packet-shaper construction, DNS hijacker construction, in-memory
    # TTL cache correctness.
    - name: Install package with Windows extras
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[windows]"

    - name: Import whydpi on Windows
      run: |
        python -c "import whydpi; print('version:', whydpi.__version__)"
        python -c "from whydpi.platforms import windows; print('windows backend imported')"
        python -c "from whydpi.system import windivert, dns_redirect_windows; print('windows system modules imported')"
        python -c "from whydpi.net import dns, dns_cache; print('dns modules imported')"
        python -c "from whydpi.ui import tray, autostart; print('ui modules imported')"

    - name: Sanity-check strategy remapping and DNS hijacker construction
      shell: python
      run: |
        import tempfile, pathlib
        from whydpi.core.strategy import Strategy
        from whydpi.core.cache import StrategyCache
        from whydpi.system.windivert import _remap_for_packet_layer, PacketShaper
        from whydpi.system.dns_redirect_windows import PacketDnsHijacker
        from whydpi.net.dns import DoHClient
        from whydpi.net.dns_cache import DnsCache

        # Since 0.2.8 the shaper handles TCP-seq rewriting natively, so
        # record:* strategies run at the packet layer unchanged.
        # _remap_for_packet_layer is a no-op kept for API compatibility.
        assert _remap_for_packet_layer(Strategy.parse("record:2")).layer == "record"
        assert _remap_for_packet_layer(Strategy.parse("record:sni-mid")).layer == "record"
        assert _remap_for_packet_layer(Strategy.parse("tcp:sni-mid")).layer == "tcp"

        # PacketShaper can be constructed without opening the driver
        with tempfile.TemporaryDirectory() as td:
            cache = StrategyCache.load(pathlib.Path(td) / "s.json")
            shaper = PacketShaper(
                default_strategy=Strategy.parse("tcp:sni-mid"),
                fallbacks=[Strategy.parse("chunked:40")],
                cache=cache,
            )
            assert shaper._default.layer == "tcp"

        # PacketDnsHijacker constructor exercises dependencies without
        # touching the WinDivert driver (start() is what opens the handle).
        doh = DoHClient(
            address="1.1.1.1", port=443, hostname="cloudflare-dns.com",
        )
        hijacker = PacketDnsHijacker(primary=doh, cache=DnsCache())
        assert not hijacker._running

        print("Windows smoke OK")

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan
      run: |
        bandit -r whydpi/ -f json -o bandit-report.json
        bandit -r whydpi/ --exit-zero
      continue-on-error: true

    - name: Check dependencies for known vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check --json --output safety-report.json || true
        safety check --continue-on-error
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
        retention-days: 30

  license-check:
    name: License Header Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check SPDX license headers
      run: |
        echo "Checking for SPDX-License-Identifier in Python files..."
        missing_license=0
        for file in $(find whydpi -name "*.py"); do
          if ! grep -q "SPDX-License-Identifier: MIT" "$file"; then
            echo "❌ Missing license header: $file"
            missing_license=$((missing_license + 1))
          fi
        done

        if [ $missing_license -gt 0 ]; then
          echo "⚠️ Found $missing_license files without proper license headers"
          exit 1
        else
          echo "✅ All Python files have proper license headers"
        fi
