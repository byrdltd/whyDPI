# Optional local hooks — run: pip install pre-commit && pre-commit install
# https://pre-commit.com
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=800"]

  - repo: local
    hooks:
      - id: reject-cursor-coauthor
        name: reject Cursor Co-authored-by trailer
        entry: scripts/reject-cursor-coauthor.sh
        language: script
        stages: [commit-msg]
        pass_filenames: true
